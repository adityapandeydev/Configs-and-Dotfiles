$font = JetBrainsMono Nerd Font

general {
    hide_cursor = false
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

animations {
    enabled = true

    bezier = easeOut, 0.25, 1, 0.5, 1

    animation = fadeIn, 1, 4, easeOut
    animation = fadeOut, 1, 4, easeOut
    animation = inputFieldDots, 1, 2, easeOut
}

# ==================================================
# BACKGROUND
# ==================================================

background {
    monitor =
    path = screenshot

    blur_passes = 3
    blur_size = 8

    contrast = 0.95
    brightness = 0.75
    vibrancy = 0.15
}

# ==================================================
# TIME
# ==================================================

label {
    monitor =

    text = cmd[update:1000] date +"%H:%M"

    color = rgba(255,255,255,0.95)

    font_size = 80
    font_family = $font

    position = 0, 190

    halign = center
    valign = center
}

# ==================================================
# DATE
# ==================================================

label {
    monitor =

    text = cmd[update:60000] date +"%A, %d %B %Y"

    color = rgba(255,255,255,0.75)

    font_size = 22
    font_family = $font

    position = 0, 125

    halign = center
    valign = center
}

# ==================================================
# GLASS CARD
# ==================================================

shape {
    monitor =

    size = 420, 280

    color = rgba(15,15,15,0.30)

    rounding = 24

    border_size = 2
    border_color = rgba(255,255,255,0.10)

    position = 0, -80

    halign = center
    valign = center
}

# ==================================================
# PROFILE PICTURE
# ==================================================

image {
    monitor =

    path = ~/.config/hypr/assets/profile.png

    size = 110

    rounding = -1

    border_size = 2
    border_color = rgba(255,255,255,0.25)

    position = 0, -10

    halign = center
    valign = center
}

# ==================================================
# USERNAME
# ==================================================

label {
    monitor =

    text = 👤  $USER

    color = rgba(255,255,255,0.90)

    font_size = 20
    font_family = $font

    position = 0, -95

    halign = center
    valign = center
}

# ==================================================
# PASSWORD FIELD
# ==================================================

input-field {
    monitor =

    size = 300, 52

    outline_thickness = 0

    inner_color = rgba(255,255,255,0.08)
    outer_color = rgba(255,255,255,0)

    font_color = rgb(240,240,240)

    fade_on_empty = false

    rounding = 16

    placeholder_text = Enter Password

    hide_input = false

    dots_center = true
    dots_spacing = 0.25
    dots_size = 0.25

    position = 0, -155

    halign = center
    valign = center
}

# ==================================================
# POWER OFF
# ==================================================

label {
    monitor =

    text = ⏻

    color = rgba(255,255,255,0.75)

    font_size = 34

    position = -80, -250

    halign = center
    valign = center

    onclick = systemctl poweroff
}

# ==================================================
# REBOOT
# ==================================================

label {
    monitor =

    text = ↻

    color = rgba(255,255,255,0.75)

    font_size = 34

    position = 0, -250

    halign = center
    valign = center

    onclick = systemctl reboot
}

# ==================================================
# SUSPEND
# ==================================================

label {
    monitor =

    text = ☾

    color = rgba(255,255,255,0.75)

    font_size = 34

    position = 80, -250

    halign = center
    valign = center

    onclick = systemctl suspend
}
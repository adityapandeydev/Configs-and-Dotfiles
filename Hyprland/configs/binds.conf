# ==================================================
# WORKSPACE BEHAVIOR
# ==================================================
# Allows jumping back to the previously used workspace
# by pressing the currently active workspace key again.
#
# Example:
#   Super+1 -> Workspace 1
#   Super+2 -> Workspace 2
#   Super+2 -> Workspace 1
#
# This creates a very fast "workspace history" workflow.
binds {
    workspace_back_and_forth = true
    allow_workspace_cycles = true
}

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Move between recent workspaces
bind = ALT, TAB, workspace, previous

# ==================================================
# APPLICATIONS
# ==================================================

# Terminal
bind = $mainMod, RETURN, exec, $terminal

# File Manager
bind = $mainMod, E, exec, $fileManager

# Browser
bind = $mainMod, B, exec, $browser

# Application Launcher (Rofi)
bind = $mainMod, R, exec, $menu

# ==================================================
# WINDOW MANAGEMENT
# ==================================================

# Fullscreen
bind = $mainMod, F, fullscreen

# Close focused window
bind = $mainMod, Q, killactive,

# Toggle floating mode
bind = $mainMod, T, togglefloating,

# Lock screen
bind = $mainMod, L, exec, hyprlock

# Power menu / exit Hyprland
# Temporary until a proper power menu is configured
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# ==================================================
# CLIPBOARD
# ==================================================

# Clipboard history picker
bind = $mainMod, C, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# ==================================================
# SCREENSHOTS
# ==================================================

# Full screen screenshot
bind = , PRINT, exec, grim ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png && notify-send "Screenshot" "Saved to ~/Pictures/Screenshots"

# Area screenshot
bind = SHIFT, PRINT, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png && notify-send "Screenshot" "Area screenshot saved"